<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<title>Розклад — Група 32</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/chcZT8wJ/2026-02-18-13-58-00.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/chcZT8wJ/2026-02-18-13-58-00.png">
<style>
/* ===================================================================
   APPLE LIQUID GLASS DESIGN SYSTEM
   iOS 26 / macOS Tahoe — Mobile-First Schedule App
   Group 32 · ЛНАМ · Graphic Design
   =================================================================== */

:root {
  /* Glass Material */
  --glass-blur: 16px;
  --glass-saturation: 1.4;
  --glass-bg: rgba(255,255,255,0.30);
  --glass-bg-thin: rgba(255,255,255,0.15);
  --glass-border: rgba(255,255,255,0.30);
  --glass-shadow-outer: rgba(0,0,0,0.06);
  --glass-highlight: rgba(255,255,255,0.40);
  --glass-radius: 24px;
  --glass-radius-inner: 16px;
  --glass-radius-sm: 14px;
  --glass-radius-xs: 12px;

  /* Typography — SF Pro scale */
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
  --large-title: 700 34px/1.12 var(--font);
  --title2: 700 22px/1.27 var(--font);
  --title3: 600 20px/1.25 var(--font);
  --headline: 600 17px/1.29 var(--font);
  --body: 400 17px/1.47 var(--font);
  --callout: 400 16px/1.38 var(--font);
  --subhead: 400 15px/1.33 var(--font);
  --footnote: 400 13px/1.38 var(--font);
  --caption1: 400 12px/1.33 var(--font);
  --caption2: 400 11px/1.27 var(--font);

  /* Colors — iOS 26 system */
  --text-primary: rgba(0,0,0,0.85);
  --text-secondary: rgba(0,0,0,0.50);
  --text-tertiary: rgba(0,0,0,0.30);
  --fill-primary: rgba(120,120,128,0.20);
  --fill-secondary: rgba(120,120,128,0.16);
  --fill-tertiary: rgba(120,120,128,0.12);
  --fill-quaternary: rgba(120,120,128,0.08);
  --separator: rgba(60,60,67,0.12);
  --bg-primary: #f2f2f7;
  --bg-grouped: #f2f2f7;

  --system-blue: #007AFF;
  --system-green: #34C759;
  --system-indigo: #5856D6;
  --system-orange: #FF9500;
  --system-pink: #FF2D55;
  --system-purple: #AF52DE;
  --system-red: #FF3B30;
  --system-teal: #5AC8FA;
  --system-yellow: #FFCC00;

  /* Spring easing — Apple WWDC25 animation system */
  --spring-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --spring-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --spring-snappy: cubic-bezier(0.2, 0, 0, 1);
  --spring-interactive: cubic-bezier(0.25, 1.25, 0.5, 1);
  --spring-gentle: cubic-bezier(0.4, 0, 0.1, 1);
  --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);

  /* Duration tokens */
  --dur-instant: 100ms;
  --dur-fast: 150ms;
  --dur-normal: 250ms;
  --dur-smooth: 350ms;
  --dur-slow: 500ms;
  --dur-dramatic: 700ms;

  /* Spacing — 8pt grid */
  --space-4: 4px;
  --space-8: 8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;
  --space-40: 40px;
  --space-48: 48px;

  /* Safe areas */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

/* ===== DARK MODE ===== */
@media (prefers-color-scheme: dark) {
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-bg-thin: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.10);
    --glass-shadow-outer: rgba(0,0,0,0.30);
    --glass-highlight: rgba(255,255,255,0.08);
    --text-primary: rgba(255,255,255,0.90);
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.30);
    --fill-primary: rgba(120,120,128,0.36);
    --fill-secondary: rgba(120,120,128,0.32);
    --fill-tertiary: rgba(120,120,128,0.24);
    --fill-quaternary: rgba(120,120,128,0.18);
    --separator: rgba(84,84,88,0.36);
    --bg-primary: #000000;
    --bg-grouped: #000000;
  }
}

/* ===== ACCESSIBILITY ===== */
@media (prefers-contrast: high) {
  :root {
    --glass-bg: rgba(255,255,255,0.60);
    --glass-border: rgba(0,0,0,0.30);
    --text-primary: rgba(0,0,0,1);
    --text-secondary: rgba(0,0,0,0.70);
  }
}

@media (prefers-reduced-transparency: reduce) {
  :root {
    --glass-bg: rgba(242,242,247,0.95);
    --glass-blur: 0px;
    --glass-saturation: 1;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  /* Replace slide/scale with simple fade */
  .modal { transform: none !important; opacity: 0; transition: opacity 150ms !important; }
  .modal-bg.open .modal { opacity: 1; }
  .confirm-box { transform: none !important; }
  .lesson { animation: none !important; }
  .glass-shimmer::before { animation: none !important; opacity: 0.03; }
}

/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font: var(--body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  color: var(--text-primary);
  overflow-x: hidden;
  position: relative;
}

/* ===== BACKGROUND — Gradient Mesh (optimized for Liquid Glass) ===== */
.bg-surface {
  position: fixed;
  inset: 0;
  z-index: 0;
  contain: paint layout;

  /* LIGHT MODE — "Soft Cloud" palette (education/calendar) */
  background:
    radial-gradient(circle at center, hsla(220, 70%, 80%, 0.8) 0px, transparent 70%),
    radial-gradient(circle at center, hsla(280, 50%, 85%, 0.6) 0px, transparent 70%),
    radial-gradient(circle at center, hsla(200, 60%, 82%, 0.7) 0px, transparent 70%),
    radial-gradient(circle at center, hsla(320, 40%, 88%, 0.5) 0px, transparent 70%),
    radial-gradient(circle at center, hsla(250, 45%, 83%, 0.4) 0px, transparent 70%),
    linear-gradient(135deg, #f0f2f8 0%, #e8ecf4 50%, #f2f0f6 100%);

  background-size:
    80% 80%, 70% 70%, 60% 60%, 90% 90%, 75% 75%, 100% 100%;
  background-position:
    15% 20%, 75% 15%, 60% 75%, 30% 55%, 85% 50%, center;
  background-repeat: no-repeat;

  will-change: background-position;
  animation: meshDrift 30s ease-in-out infinite alternate;
}

/* Grain overlay — anti-banding texture */
.bg-surface::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.03;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 1;
}

/* Subtle vignette */
.bg-surface::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.06) 100%);
  pointer-events: none;
}

@keyframes meshDrift {
  0% {
    background-position:
      15% 20%, 75% 15%, 60% 75%, 30% 55%, 85% 50%, center;
  }
  100% {
    background-position:
      25% 35%, 65% 25%, 50% 65%, 40% 45%, 75% 60%, center;
  }
}

/* DARK MODE — same hues, deeper saturation, dark base */
@media (prefers-color-scheme: dark) {
  .bg-surface {
    background:
      radial-gradient(circle at center, hsla(220, 75%, 55%, 0.6) 0px, transparent 70%),
      radial-gradient(circle at center, hsla(280, 65%, 50%, 0.5) 0px, transparent 70%),
      radial-gradient(circle at center, hsla(200, 70%, 48%, 0.5) 0px, transparent 70%),
      radial-gradient(circle at center, hsla(320, 55%, 45%, 0.4) 0px, transparent 70%),
      radial-gradient(circle at center, hsla(250, 55%, 40%, 0.3) 0px, transparent 70%),
      linear-gradient(135deg, #0a0a1a 0%, #121228 50%, #0d0d20 100%);

    background-size:
      80% 80%, 70% 70%, 60% 60%, 90% 90%, 75% 75%, 100% 100%;
    background-position:
      15% 20%, 75% 15%, 60% 75%, 30% 55%, 85% 50%, center;
    background-repeat: no-repeat;
  }

  .bg-surface::after {
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.25) 100%);
  }
}

/* ===== APP SHELL ===== */
.app {
  position: relative;
  z-index: 1;
  max-width: 600px;
  margin: 0 auto;
  padding: var(--space-16);
  padding-top: calc(var(--safe-top) + var(--space-16));
  padding-bottom: calc(var(--safe-bottom) + 100px); /* room for floating tab bar */
}

/* ===== HEADER ===== */
.header {
  padding: var(--space-40) 0 var(--space-24);
  animation: headerMaterialize 600ms var(--spring-gentle) both;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-8);
  font: var(--caption1);
  letter-spacing: 0px;
  color: var(--text-secondary);
  margin-bottom: var(--space-8);
}

.header-badge .live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--system-green);
  box-shadow: 0 0 4px rgba(52,199,89,0.5);
  animation: pulse 2.5s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.35; }
}

.header h1 {
  font: var(--large-title);
  letter-spacing: -0.4px;
  color: var(--text-primary);
}

.header .subtitle {
  font: var(--subhead);
  letter-spacing: -0.23px;
  color: var(--text-secondary);
  margin-top: var(--space-4);
}

/* ===== FLOATING TAB BAR — Capsule (iOS 26 pattern) ===== */
.tab-bar {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 16px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 2px;
  padding: 4px;

  /* Liquid Glass material */
  background: linear-gradient(
    135deg,
    var(--glass-bg),
    var(--glass-bg-thin)
  );
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  border: 1px solid var(--glass-border);
  border-radius: 9999px; /* capsule */
  box-shadow:
    0 8px 32px var(--glass-shadow-outer),
    0 2px 8px rgba(0,0,0,0.04),
    inset 0 1px 0 var(--glass-highlight),
    inset 0 -0.5px 0 rgba(0,0,0,0.04);

  animation: tabBarMaterialize 500ms var(--spring-bounce) 0.3s both;

  /* Scroll collapse morph */
  transition:
    transform 400ms var(--spring-smooth),
    padding 400ms var(--spring-smooth),
    opacity 300ms;
}

/* Collapsed state on scroll */
.tab-bar.collapsed {
  padding: 3px;
  transform: translateX(-50%) scale(0.88);
  opacity: 0.92;
}

/* Glass highlight overlay */
.tab-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  border-radius: 9999px 9999px 0 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.10), transparent);
  pointer-events: none;
}

.tab-item {
  position: relative;
  border: none;
  background: none;
  padding: var(--space-8) var(--space-16);
  border-radius: 9999px;
  cursor: pointer;
  font: var(--caption1);
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--text-tertiary);
  transition: all var(--dur-normal) var(--spring-smooth);
  -webkit-tap-highlight-color: transparent;
  min-height: 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}

.tab-item .tab-label {
  font: var(--caption2);
  font-weight: 600;
  letter-spacing: 0.06px;
  transition: color var(--dur-normal) var(--spring-smooth);
}

.tab-item .tab-count {
  font-size: 9px;
  font-weight: 500;
  opacity: 0.6;
  transition: all var(--dur-normal) var(--spring-smooth);
}

.tab-item:active {
  transform: scale(0.92);
  transition-duration: var(--dur-instant);
  transition-timing-function: var(--spring-snappy);
}

.tab-item.active {
  background: var(--system-blue);
  color: white;
  box-shadow: 0 2px 8px rgba(0,122,255,0.3);
}

.tab-item.active .tab-label { color: white; }
.tab-item.active .tab-count { color: rgba(255,255,255,0.8); opacity: 1; }

.tab-item.today::after {
  content: '';
  position: absolute;
  bottom: 3px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--system-blue);
}

.tab-item.active.today::after {
  background: white;
}

/* ===== SCHEDULE CONTENT ===== */
.schedule {
  animation: sectionMaterialize 500ms var(--spring-gentle) 0.15s both;
}

.schedule-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-16);
}

.schedule-day {
  font: var(--title2);
  letter-spacing: -0.26px;
  color: var(--text-primary);
}

/* Add button — pill/capsule */
.btn-add {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-8) var(--space-16);
  border: none;
  border-radius: 9999px;
  background: var(--system-blue);
  color: white;
  font: var(--footnote);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--dur-normal) var(--spring-smooth);
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 8px rgba(0,122,255,0.25);
  min-height: 36px;
  will-change: transform;
}

.btn-add:active {
  transform: scale(0.95);
  transition-duration: var(--dur-instant);
  transition-timing-function: var(--spring-snappy);
}

.btn-add svg { width: 14px; height: 14px; }

/* ===== LESSON CARDS — Liquid Glass ===== */
.lessons {
  display: flex;
  flex-direction: column;
  gap: var(--space-8);
}

.lesson {
  position: relative;
  overflow: hidden;
  display: flex;
  gap: var(--space-12);
  padding: var(--space-16) var(--space-16) var(--space-16) var(--space-20);

  /* Liquid Glass material */
  background: linear-gradient(
    135deg,
    var(--glass-bg),
    var(--glass-bg-thin)
  );
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  border: 1px solid var(--glass-border);
  border-radius: var(--glass-radius);
  box-shadow:
    0 4px 24px var(--glass-shadow-outer),
    inset 0 1px 0 var(--glass-highlight),
    inset 0 -0.5px 0 rgba(0,0,0,0.04);

  transition: transform var(--dur-normal) var(--spring-smooth),
    box-shadow var(--dur-normal) var(--spring-smooth);
  animation: cardMaterialize 450ms var(--spring-bounce) both;
  animation-delay: calc(var(--stagger, 0) * 50ms);
  -webkit-tap-highlight-color: transparent;
  will-change: transform;
}

/* Glass highlight */
.lesson::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  border-radius: var(--glass-radius) var(--glass-radius) 0 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
  pointer-events: none;
}

/* Touch illumination overlay */
.lesson .l-illumination {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(
    circle at var(--touch-x, 50%) var(--touch-y, 50%),
    rgba(255,255,255,0.12) 0%,
    transparent 60%
  );
  opacity: 0;
  transition: opacity var(--dur-fast);
  pointer-events: none;
}

.lesson.touching .l-illumination { opacity: 1; }

/* Accent stripe */
.lesson::after {
  content: '';
  position: absolute;
  top: var(--space-12); left: 0;
  width: 3px;
  height: calc(100% - var(--space-24));
  border-radius: 0 3px 3px 0;
}

.lesson[data-c="blue"]::after { background: var(--system-blue); }
.lesson[data-c="purple"]::after { background: var(--system-purple); }
.lesson[data-c="pink"]::after { background: var(--system-pink); }
.lesson[data-c="orange"]::after { background: var(--system-orange); }
.lesson[data-c="green"]::after { background: var(--system-green); }
.lesson[data-c="teal"]::after { background: var(--system-teal); }
.lesson[data-c="red"]::after { background: var(--system-red); }
.lesson[data-c="indigo"]::after { background: var(--system-indigo); }
.lesson[data-c="yellow"]::after { background: var(--system-yellow); }

.lesson:active {
  transform: scale(0.97);
  transition-duration: var(--dur-instant);
  transition-timing-function: var(--spring-snappy);
}

/* Desktop hover — gentle lift */
@media (hover: hover) {
  .lesson:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow:
      0 12px 40px rgba(0,0,0,0.10),
      0 4px 12px rgba(0,0,0,0.06),
      inset 0 1px 0 var(--glass-highlight);
  }
}

@keyframes cardMaterialize {
  0% {
    opacity: 0;
    transform: translateY(12px) scale(0.97);
    backdrop-filter: blur(0px) saturate(1);
  }
  60% {
    backdrop-filter: blur(12px) saturate(1.2);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  }
}

/* Time block */
.l-time {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 48px;
  flex-shrink: 0;
}

.l-time-start {
  font: var(--headline);
  letter-spacing: -0.43px;
  color: var(--text-primary);
}

.l-time-sep {
  width: 1px; height: 8px;
  background: var(--text-tertiary);
  margin: 2px 0;
  border-radius: 1px;
}

.l-time-end {
  font: var(--caption1);
  color: var(--text-secondary);
}

.l-pair-badge {
  font: var(--caption2);
  letter-spacing: 0.06px;
  color: var(--text-tertiary);
  background: var(--fill-quaternary);
  padding: 2px var(--space-8);
  border-radius: 6px;
  margin-top: var(--space-4);
}

/* Info block */
.l-info { flex: 1; min-width: 0; }

.l-subject {
  font: var(--headline);
  letter-spacing: -0.43px;
  color: var(--text-primary);
  margin-bottom: var(--space-4);
  line-height: 1.35;
}

.l-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-8) var(--space-12);
}

.l-meta-item {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  font: var(--caption1);
  color: var(--text-secondary);
}

.l-meta-item svg {
  width: 12px; height: 12px;
  opacity: 0.5;
  flex-shrink: 0;
}

/* Link chip */
.l-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-4);
  margin-top: var(--space-8);
  padding: var(--space-4) var(--space-12);
  background: rgba(0,122,255,0.08);
  color: var(--system-blue);
  font: var(--caption1);
  font-weight: 600;
  border-radius: 9999px;
  text-decoration: none;
  transition: background 150ms;
  max-width: 100%;
}

.l-link:active { background: rgba(0,122,255,0.16); }
.l-link svg { width: 11px; height: 11px; flex-shrink: 0; }
.l-link span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

@media (prefers-color-scheme: dark) {
  .l-link { background: rgba(0,122,255,0.15); }
  .l-link:active { background: rgba(0,122,255,0.25); }
}

/* Actions — always visible on mobile (no hover) */
.l-actions {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  justify-content: center;
  flex-shrink: 0;
}

.l-act {
  width: 36px; height: 36px; /* 44px tap target with padding */
  border: none;
  border-radius: var(--glass-radius-xs);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--fill-quaternary);
  transition: all var(--dur-fast);
  -webkit-tap-highlight-color: transparent;
  padding: 0;
  will-change: transform;
}

.l-act:active { transform: scale(0.88); transition-duration: var(--dur-instant); }

.l-act svg { width: 14px; height: 14px; }
.l-act.edit { color: var(--system-blue); }
.l-act.edit:active { background: rgba(0,122,255,0.15); }
.l-act.del { color: var(--system-red); }
.l-act.del:active { background: rgba(255,59,48,0.15); }

/* ===== EMPTY STATE ===== */
.empty {
  text-align: center;
  padding: var(--space-48) var(--space-24);
  background: linear-gradient(135deg, var(--glass-bg), var(--glass-bg-thin));
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  border: 1px solid var(--glass-border);
  border-radius: var(--glass-radius);
  box-shadow: inset 0 1px 0 var(--glass-highlight);
  position: relative;
  overflow: hidden;
  animation: cardMaterialize 450ms var(--spring-bounce) both;
}

/* Ambient specular shimmer on empty card */
.empty::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(
    110deg,
    transparent 0%, transparent 40%,
    rgba(255,255,255,0.06) 45%,
    rgba(255,255,255,0.12) 50%,
    rgba(255,255,255,0.06) 55%,
    transparent 60%, transparent 100%
  );
  background-size: 200% 100%;
  animation: glassShimmer 3s ease-in-out infinite;
  pointer-events: none;
  mix-blend-mode: overlay;
}

.empty-icon { font-size: 48px; margin-bottom: var(--space-12); }

.empty h3 {
  font: var(--title3);
  letter-spacing: -0.45px;
  color: var(--text-secondary);
  margin-bottom: var(--space-4);
}

.empty p {
  font: var(--footnote);
  color: var(--text-tertiary);
}

/* ===== MODAL — Sheet (Liquid Glass) ===== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.12);
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition:
    opacity 300ms var(--spring-smooth),
    backdrop-filter 300ms var(--spring-smooth),
    -webkit-backdrop-filter 300ms var(--spring-smooth);
}

.modal-bg.open {
  opacity: 1;
  pointer-events: all;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.modal {
  width: 100%;
  max-width: 500px;
  max-height: 92vh;
  max-height: 92dvh;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;

  background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.55));
  backdrop-filter: blur(40px) saturate(1.5) brightness(1.12);
  -webkit-backdrop-filter: blur(40px) saturate(1.5) brightness(1.12);
  border: 1px solid var(--glass-border);
  border-radius: var(--space-24) var(--space-24) 0 0;
  padding: var(--space-24);
  padding-bottom: calc(var(--safe-bottom) + var(--space-24));

  box-shadow:
    0 -8px 40px rgba(0,0,0,0.12),
    inset 0 1px 0 var(--glass-highlight);

  transform: translateY(100%);
  transition: transform 400ms var(--spring-snappy);
}

.modal::-webkit-scrollbar { display: none; }

.modal-bg.open .modal {
  transform: translateY(0);
}

@media (prefers-color-scheme: dark) {
  .modal {
    background: linear-gradient(135deg, rgba(40,40,40,0.80), rgba(30,30,30,0.65));
    backdrop-filter: blur(40px) saturate(1.3) brightness(0.85);
    -webkit-backdrop-filter: blur(40px) saturate(1.3) brightness(0.85);
  }
}

/* Modal handle */
.modal-handle {
  width: 36px; height: 5px;
  border-radius: 3px;
  background: var(--fill-primary);
  margin: 0 auto var(--space-20);
}

.modal h2 {
  font: var(--title2);
  letter-spacing: -0.26px;
  color: var(--text-primary);
  margin-bottom: var(--space-20);
}

/* Form fields */
.field { margin-bottom: var(--space-16); }

.field-label {
  display: block;
  font: var(--caption1);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: var(--space-4);
}

.field-input, .field-select {
  width: 100%;
  padding: var(--space-12) var(--space-16);
  background: var(--fill-quaternary);
  border: 1px solid transparent;
  border-radius: var(--glass-radius-xs);
  font: var(--body);
  letter-spacing: -0.43px;
  color: var(--text-primary);
  outline: none;
  transition: all var(--dur-normal) var(--spring-smooth);
  -webkit-appearance: none;
  min-height: 48px;
}

.field-input::placeholder { color: var(--text-tertiary); }

.field-input:focus, .field-select:focus {
  border-color: var(--system-blue);
  box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
  background: var(--fill-tertiary);
}

.field-hint {
  font: var(--caption2);
  color: var(--text-tertiary);
  margin-top: var(--space-4);
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-12);
}

/* Color chips */
.colors { display: flex; gap: var(--space-8); flex-wrap: wrap; }

.color-chip {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all 200ms var(--spring-smooth);
  -webkit-tap-highlight-color: transparent;
}

.color-chip:active { transform: scale(0.9); transition-duration: var(--dur-instant); }
.color-chip.on { border-color: var(--text-primary); transform: scale(1.15); }

.color-chip[data-c="blue"] { background: var(--system-blue); }
.color-chip[data-c="purple"] { background: var(--system-purple); }
.color-chip[data-c="pink"] { background: var(--system-pink); }
.color-chip[data-c="orange"] { background: var(--system-orange); }
.color-chip[data-c="green"] { background: var(--system-green); }
.color-chip[data-c="teal"] { background: var(--system-teal); }
.color-chip[data-c="red"] { background: var(--system-red); }
.color-chip[data-c="indigo"] { background: var(--system-indigo); }
.color-chip[data-c="yellow"] { background: var(--system-yellow); }

/* Modal buttons */
.modal-btns {
  display: flex;
  gap: var(--space-8);
  margin-top: var(--space-24);
}

.mbtn {
  flex: 1;
  padding: var(--space-16);
  border: none;
  border-radius: var(--glass-radius-sm);
  font: var(--headline);
  letter-spacing: -0.43px;
  cursor: pointer;
  transition: all var(--dur-normal) var(--spring-smooth);
  -webkit-tap-highlight-color: transparent;
  min-height: 52px;
  will-change: transform;
}

.mbtn:active { transform: scale(0.97); transition-duration: var(--dur-instant); transition-timing-function: var(--spring-snappy); }

.mbtn.cancel {
  background: var(--fill-quaternary);
  color: var(--text-secondary);
}

.mbtn.save {
  background: var(--system-blue);
  color: white;
  box-shadow: 0 4px 12px rgba(0,122,255,0.25);
}

.mbtn.danger {
  background: var(--system-red);
  color: white;
  box-shadow: 0 4px 12px rgba(255,59,48,0.25);
}

/* ===== CONFIRM SHEET ===== */
.confirm-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.12);
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-24);
  opacity: 0;
  pointer-events: none;
  transition:
    opacity var(--dur-normal),
    backdrop-filter var(--dur-normal),
    -webkit-backdrop-filter var(--dur-normal);
}

.confirm-bg.open {
  opacity: 1;
  pointer-events: all;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.confirm-box {
  background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.58));
  backdrop-filter: blur(40px) saturate(1.5) brightness(1.1);
  -webkit-backdrop-filter: blur(40px) saturate(1.5) brightness(1.1);
  border: 1px solid var(--glass-border);
  border-radius: var(--glass-radius);
  padding: var(--space-24);
  max-width: 320px;
  width: 100%;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.15), inset 0 1px 0 var(--glass-highlight);
  transform: scale(0.88);
  opacity: 0;
  transition:
    transform var(--dur-smooth) var(--spring-bounce),
    opacity 200ms ease-out;
}

.confirm-bg.open .confirm-box { transform: scale(1); opacity: 1; }

@media (prefers-color-scheme: dark) {
  .confirm-box {
    background: linear-gradient(135deg, rgba(40,40,40,0.82), rgba(30,30,30,0.68));
  }
}

.confirm-box h3 {
  font: var(--title3);
  letter-spacing: -0.45px;
  margin-bottom: var(--space-4);
}

.confirm-box p {
  font: var(--footnote);
  color: var(--text-secondary);
  margin-bottom: var(--space-20);
}

.confirm-btns { display: flex; gap: var(--space-8); }
.confirm-btns .mbtn { flex: 1; }

/* ===== APPLE LIQUID GLASS KEYFRAMES ===== */

/* Header materialization */
@keyframes headerMaterialize {
  0% { opacity: 0; transform: translateY(-8px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Section materialization */
@keyframes sectionMaterialize {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Tab bar materialization from bottom */
@keyframes tabBarMaterialize {
  0% {
    opacity: 0;
    transform: translateX(-50%) translateY(24px) scale(0.92);
    backdrop-filter: blur(0px) saturate(1);
  }
  50% {
    backdrop-filter: blur(10px) saturate(1.2);
  }
  100% {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
  }
}

/* Specular shimmer — slow ambient */
@keyframes glassShimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Live dot pulse */
@keyframes pulse {
  0%,100% { opacity:1; transform: scale(1); }
  50% { opacity:0.35; transform: scale(0.85); }
}
</style>

<script>
/* ============================================================
   SCHEDULE APP — Group 32, ЛНАМ
   ============================================================ */

const T = {
  1:{s:'9:00',e:'10:35'}, 2:{s:'10:50',e:'12:25'},
  3:{s:'13:05',e:'14:40'}, 4:{s:'14:50',e:'16:25'},
  5:{s:'16:35',e:'18:10'}, 6:{s:'18:20',e:'19:55'}
};

const DAYS = [
  {k:'mon',n:'ПН',f:'Понеділок',d:1},
  {k:'tue',n:'ВТ',f:'Вівторок',d:2},
  {k:'wed',n:'СР',f:'Середа',d:3},
  {k:'thu',n:'ЧТ',f:'Четвер',d:4},
  {k:'fri',n:'ПТ',f:"П\u2019ятниця",d:5}
];

const INIT = {
  mon:[
    {id:1,pair:1,subject:'Інформаційний дизайн',teacher:'',room:'Онлайн',type:'Лекція',color:'teal',link:''},
    {id:2,pair:3,subject:'Дизайн книги',teacher:'Г. Шевчук',room:'608',type:'Практична',color:'purple',link:''},
    {id:3,pair:4,subject:'Дизайн книги',teacher:'Г. Шевчук',room:'608',type:'Практична',color:'purple',link:''},
    {id:4,pair:5,subject:'Дизайн книги',teacher:'Г. Шевчук',room:'608',type:'Практична',color:'purple',link:''}
  ],
  tue:[
    {id:5,pair:2,subject:'Проектування',teacher:'О. Топольницький',room:'606',type:'Практична',color:'yellow',link:''},
    {id:6,pair:3,subject:'Проектування',teacher:'О. Топольницький',room:'606',type:'Практична',color:'yellow',link:''}
  ],
  wed:[
    {id:7,pair:1,subject:'Ілюстрація',teacher:'Т. Загачевська',room:'10',type:'Практична',color:'pink',link:''},
    {id:8,pair:2,subject:'Ілюстрація',teacher:'Т. Загачевська',room:'10',type:'Практична',color:'pink',link:''},
    {id:9,pair:5,subject:'Рисунок',teacher:'І. Онуфрик',room:'602',type:'Практична',color:'red',link:''},
    {id:10,pair:6,subject:'Рисунок',teacher:'І. Онуфрик',room:'602',type:'Практична',color:'red',link:''}
  ],
  thu:[
    {id:11,pair:2,subject:'Дизайн взаємодії',teacher:'Д. Козицький',room:'606',type:'Практична',color:'indigo',link:''},
    {id:12,pair:3,subject:'Дизайн взаємодії',teacher:'Д. Козицький',room:'606',type:'Практична',color:'indigo',link:''},
    {id:13,pair:5,subject:'Іноземна мова',teacher:'',room:'Гуртож.',type:'Практична',color:'green',link:''}
  ],
  fri:[]
};

const KEY = 'lnam_32_v5';
let data = JSON.parse(localStorage.getItem(KEY)||'null') || JSON.parse(JSON.stringify(INIT));
let day = todayKey();
let editId = null, delId = null, delDay = null, nid = 300;

const ic = {
  person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  loc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  del:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  ext:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
};

function save(){ localStorage.setItem(KEY, JSON.stringify(data)); }

function todayKey(){
  return {1:'mon',2:'tue',3:'wed',4:'thu',5:'fri'}[new Date().getDay()]||'mon';
}

function pLabel(url){
  try {
    const h = new URL(url).hostname.replace('www.','');
    if(h.includes('meet.google')) return 'Google Meet';
    if(h.includes('zoom')) return 'Zoom';
    if(h.includes('teams')) return 'MS Teams';
    if(h.includes('moodle')||h.includes('lms')) return 'Moodle';
    if(h.includes('classroom')) return 'Classroom';
    return h;
  } catch { return 'Посилання'; }
}

function pl(n){
  if(n===1) return 'пара';
  if(n>=2&&n<=4) return 'пари';
  return 'пар';
}

/* ===== RENDER ===== */
function renderTabs(){
  const tk = todayKey();
  document.getElementById('tabBar').innerHTML = DAYS.map(d => {
    const c = (data[d.k]||[]).length;
    const cls = [
      'tab-item',
      d.k===day?'active':'',
      d.k===tk?'today':''
    ].filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="go('${d.k}')">
      <span class="tab-label">${d.n}</span>
      <span class="tab-count">${c}</span>
    </button>`;
  }).join('');
}

function render(){
  const D = DAYS.find(d=>d.k===day);
  const L = (data[day]||[]).sort((a,b)=>a.pair-b.pair);
  const el = document.getElementById('schedule');

  let h = `<div class="schedule-header">
    <span class="schedule-day">${D.f}</span>
    <button class="btn-add" onclick="openAdd()">${ic.plus} Додати</button>
  </div>`;

  if(!L.length){
    h += `<div class="empty"><div class="empty-icon">☀️</div><h3>Вільний день</h3><p>Натисніть «Додати» для створення пари</p></div>`;
  } else {
    h += '<div class="lessons">';
    L.forEach((l,i) => {
      const t = T[l.pair];
      const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      const link = l.link ? `<a class="l-link" href="${esc(l.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${ic.ext}<span>${pLabel(l.link)}</span></a>` : '';

      h += `<div class="lesson" data-c="${l.color}" data-id="${l.id}" style="--stagger:${i}">
        <div class="l-illumination"></div>
        <div class="l-time">
          <span class="l-time-start">${t.s}</span>
          <div class="l-time-sep"></div>
          <span class="l-time-end">${t.e}</span>
          <span class="l-pair-badge">${l.pair} пара</span>
        </div>
        <div class="l-info">
          <div class="l-subject">${esc(l.subject)}</div>
          <div class="l-meta">
            ${l.teacher?`<span class="l-meta-item">${ic.person} ${esc(l.teacher)}</span>`:''}
            ${l.room?`<span class="l-meta-item">${ic.loc} ${esc(l.room)}</span>`:''}
            ${l.type?`<span class="l-meta-item">${ic.tag} ${esc(l.type)}</span>`:''}
          </div>
          ${link}
        </div>
        <div class="l-actions">
          <button class="l-act edit" onclick="openEdit('${day}',${l.id})">${ic.edit}</button>
          <button class="l-act del" onclick="askDel('${day}',${l.id},'${esc(l.subject)}')">${ic.del}</button>
        </div>
      </div>`;
    });
    h += '</div>';
  }
  el.innerHTML = h;
}

function go(k){ day=k; renderTabs(); render(); }

/* ===== MODAL ===== */
const $=id=>document.getElementById(id);

function selColor(c){
  document.querySelectorAll('.color-chip').forEach(e=>e.classList.toggle('on',e.dataset.c===c));
}

$('colorPicker').addEventListener('click',e=>{
  const ch=e.target.closest('.color-chip');
  if(ch) selColor(ch.dataset.c);
});

function openAdd(){
  editId=null;
  $('modalTitle').textContent='Додати пару';
  $('fSubject').value='';
  $('fPair').value='1';
  $('fType').value='Практична';
  $('fTeacher').value='';
  $('fRoom').value='';
  $('fLink').value='';
  selColor('blue');
  $('modalBg').classList.add('open');
  setTimeout(()=>$('fSubject').focus(),350);
}

function openEdit(d,id){
  const l=data[d].find(x=>x.id===id);
  if(!l) return;
  editId=id;
  $('modalTitle').textContent='Редагувати';
  $('fSubject').value=l.subject;
  $('fPair').value=l.pair;
  $('fType').value=l.type;
  $('fTeacher').value=l.teacher;
  $('fRoom').value=l.room;
  $('fLink').value=l.link||'';
  selColor(l.color);
  $('modalBg').classList.add('open');
}

function closeModal(){ $('modalBg').classList.remove('open'); editId=null; }

function saveLesson(){
  const subj=$('fSubject').value.trim();
  if(!subj){
    $('fSubject').style.borderColor='var(--system-red)';
    $('fSubject').focus();
    setTimeout(()=>$('fSubject').style.borderColor='',1500);
    return;
  }
  const o = {
    subject: subj,
    pair: +$('fPair').value,
    type: $('fType').value,
    teacher: $('fTeacher').value.trim(),
    room: $('fRoom').value.trim(),
    link: $('fLink').value.trim(),
    color: document.querySelector('.color-chip.on')?.dataset.c||'blue'
  };
  if(editId!==null){
    const l=data[day].find(x=>x.id===editId);
    if(l) Object.assign(l,o);
  } else {
    data[day]=data[day]||[];
    data[day].push({id:nid++,...o});
  }
  save(); closeModal(); renderTabs(); render();
}

/* ===== DELETE ===== */
function askDel(d,id,s){
  delId=id; delDay=d;
  $('confirmText').textContent=`«${s}» буде видалено.`;
  $('confirmBg').classList.add('open');
}

function closeConfirm(){ $('confirmBg').classList.remove('open'); delId=null; delDay=null; }

function doDelete(){
  if(delDay&&delId!==null){
    data[delDay]=data[delDay].filter(x=>x.id!==delId);
    save();
  }
  closeConfirm(); renderTabs(); render();
}

/* ===== EVENTS ===== */
$('modalBg').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
$('confirmBg').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeConfirm(); });
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closeConfirm(); }
});

/* ===== TOUCH ILLUMINATION ===== */
document.addEventListener('pointerdown', e => {
  const card = e.target.closest('.lesson');
  if (!card) return;
  const r = card.getBoundingClientRect();
  card.style.setProperty('--touch-x', ((e.clientX - r.left) / r.width * 100) + '%');
  card.style.setProperty('--touch-y', ((e.clientY - r.top) / r.height * 100) + '%');
  card.classList.add('touching');
});

document.addEventListener('pointerup', () => {
  document.querySelectorAll('.lesson.touching').forEach(c => c.classList.remove('touching'));
});

document.addEventListener('pointercancel', () => {
  document.querySelectorAll('.lesson.touching').forEach(c => c.classList.remove('touching'));
});

/* ===== SCROLL → TAB BAR COLLAPSE ===== */
let lastScroll = 0;
let scrollDir = 0; // 1 = down, -1 = up
const tabBar = $('tabBar');

window.addEventListener('scroll', () => {
  const y = window.scrollY;
  if (y > lastScroll + 4) { scrollDir = 1; }
  else if (y < lastScroll - 4) { scrollDir = -1; }
  lastScroll = y;

  if (scrollDir === 1 && y > 80) {
    tabBar.classList.add('collapsed');
  } else {
    tabBar.classList.remove('collapsed');
  }
}, { passive: true });

/* ===== APP CONTENT BEHIND SHEET ===== */
const appEl = document.querySelector('.app');

function sheetOpen() {
  appEl.style.transition = 'transform 400ms cubic-bezier(0.4,0,0.2,1), border-radius 400ms cubic-bezier(0.4,0,0.2,1)';
  appEl.style.transform = 'scale(0.94) translateY(-12px)';
  appEl.style.borderRadius = '16px';
  appEl.style.overflow = 'hidden';
}

function sheetClose() {
  appEl.style.transform = '';
  appEl.style.borderRadius = '';
  setTimeout(() => { appEl.style.overflow = ''; }, 400);
}

// Patch modal open/close
const _openAdd = openAdd;
openAdd = function() { _openAdd(); sheetOpen(); };
const _openEdit = openEdit;
openEdit = function(d,id) { _openEdit(d,id); sheetOpen(); };
const _closeModal = closeModal;
closeModal = function() { _closeModal(); sheetClose(); };

/* ===== INIT ===== */
renderTabs();
render();
</script>
</body>
</html>
